syntax = "proto3";

package sentry_protos.billing.v1;

import "sentry_protos/billing/v1/date.proto";
import "sentry_protos/billing/v1/sku.proto";

// Whether the credit represents a cents allowance or a unit quantity.
enum CreditType {
  CREDIT_TYPE_UNSPECIFIED = 0;
  // A monetary allowance measured in cents.
  CREDIT_TYPE_CENTS = 1;
  // A quantity of units for a specific SKU.
  CREDIT_TYPE_UNITS = 2;
}

// How this credit was originated.
enum CreditSource {
  CREDIT_SOURCE_UNSPECIFIED = 0;
  // Credit granted by a trial.
  CREDIT_SOURCE_TRIAL = 1;
  //Credit manually granted by a Sentry employee.
  CREDIT_SOURCE_ADMIN = 2;
}

// The current status of a credit.
enum CreditStatus {
  CREDIT_STATUS_UNSPECIFIED = 0;
  CREDIT_STATUS_ACTIVE = 1;
  CREDIT_STATUS_INACTIVE = 2;
}

// A credit granted to an organization, representing either a monetary
// allowance (in cents) or a number of units for specific SKUs.
message Credit {
  uint64 id = 1;
  uint64 organization_id = 2;
  CreditType type = 3;
  // The SKUs this credit applies to. Empty means all SKUs.
  repeated sentry_protos.billing.v1.SKU skus = 4;
  // Amount in cents (for CENTS credits) or unit count (for UNITS credits).
  int64 amount = 5;
  Date start_date = 6;
  Date end_date = 7;
  CreditSource source = 8;
  // The trial that originated this credit, when source == CREDIT_SOURCE_TRIAL.
  // Matches the trial_id oneof in Trial: string for legacy trials (e.g. "product_123"),
  // integer for new trials.
  oneof trial_id {
    string trial_string_id = 9;
    uint64 trial_int_id = 10;
  }
  CreditStatus status = 11;
}
