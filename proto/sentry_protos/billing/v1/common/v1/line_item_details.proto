syntax = "proto3";

package sentry_protos.billing.v1.common.v1;

import "sentry_protos/billing/v1/common/v1/billable_metric.proto";
import "sentry_protos/billing/v1/common/v1/unit_info.proto";

// Details of a SKU line item in the billing system.
message LineItemDetails {
  // Unique identifier for the line item.
  string uid = 1;

  // Internal unique name for the SKU.
  string unique_name = 2;

  // Customer-facing display name for the SKU.
  string customer_facing_name = 3;

  // Plural form of the customer-facing name.
  string plural = 4;

  // Unit information for measurement.
  UnitInfo units = 5;

  // Defines how usage data is transformed into this line item.
  BillableMetric billable_metric = 6;
}
