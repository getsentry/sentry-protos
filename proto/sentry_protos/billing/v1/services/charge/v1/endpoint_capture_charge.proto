syntax = "proto3";

package sentry_protos.billing.v1.services.charge.v1;

import "google/protobuf/timestamp.proto";

// How the charge should be executed against the payment provider.
enum ChargeMethod {
  // Record the charge against our DB models without contacting any
  // external payment provider. Payment is expected to be collected
  // externally.
  CHARGE_METHOD_NONE = 0;
  // Call the Stripe API to bill the customer for this charge.
  CHARGE_METHOD_STRIPE = 1;
}

message CaptureChargeRequest {
  ChargeMethod charge_method = 1;
  int64 amount_cents = 2;
  optional string description = 3;
  uint64 organization_id = 5;
  google.protobuf.Timestamp current_ts = 6;
  optional string invoice_id = 7;
}

message CaptureChargeResponse {
  bool paid = 1;
  optional string failure_code = 2;
}
