syntax = "proto3";

package sentry_protos.billing.v1.services.charge.v1;

import "google/protobuf/timestamp.proto";
import "sentry_protos/billing/v1/common/v1/payment_config.proto";
import "sentry_protos/billing/v1/common/v1/stripe_charge.proto";

// How the charge should be executed against the payment provider.
enum ChargeMethod {
  // Default zero value. Requests with this value must be rejected so
  // that an unset charge_method is never silently treated as an active
  // billing choice.
  CHARGE_METHOD_UNSPECIFIED = 0;
  // Record the charge against our DB models without contacting any
  // external payment provider. Payment is expected to be collected
  // externally.
  CHARGE_METHOD_NONE = 1;
  // Call the Stripe API to bill the customer for this charge.
  CHARGE_METHOD_STRIPE = 2;
  // Record a PlatformCharge for a Stripe charge that already succeeded
  // via a PaymentIntent confirmed elsewhere (typically the customer-facing
  // manual Pay Now flow in the browser). The Stripe API is NOT called
  // from this code path -- amounts, currency, and status are taken from
  // the ``stripe_charge`` field on the request.
  CHARGE_METHOD_STRIPE_PAYMENT_INTENT = 3;
}

message CaptureChargeRequest {
  ChargeMethod charge_method = 1;
  uint64 amount_cents = 2;
  optional string description = 3;
  uint64 organization_id = 4;
  google.protobuf.Timestamp current_ts = 5;
  optional string invoice_id = 6;
  optional string invoice_guid = 7;
  optional sentry_protos.billing.v1.common.v1.PaymentConfig payment_config = 8;
  // Required when ``charge_method`` is CHARGE_METHOD_STRIPE_PAYMENT_INTENT.
  // Carries the already-succeeded Stripe charge object so the service can
  // populate the PlatformCharge row (stripe_id, amount, card_last4, etc.)
  // without a Stripe API call.
  optional sentry_protos.billing.v1.common.v1.StripeCharge stripe_charge = 9;
}

message CaptureChargeResponse {
  bool paid = 1;
  optional string failure_code = 2;
}
