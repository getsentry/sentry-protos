syntax = "proto3";

package sentry_protos.billing.v1.services.charge.v1;

message SyncStripeChargeRequest {
  string customer_id = 1;
  string stripe_charge_id = 2;
  string failure_code = 3;
  int64 created = 4;
  int64 amount = 5;
  int64 amount_refunded = 6;
  bool paid = 7;
  bool refunded = 8;
  string card_last4 = 9;
  string invoice_guid = 10;
  string stripe_invoice_id = 11;
}

message SyncStripeChargeResponse {
  uint64 organization_id = 1;
  string invoice_guid = 2;
}
