syntax = "proto3";

package sentry_protos.billing.v1.services.account_status.v1;

enum Status {
  STATUS_UNSPECIFIED = 0;
  STATUS_ACTIVE = 1;
  STATUS_CLOSED = 2;
  STATUS_PAST_DUE = 3;
}

enum OnDemandStatus {
  ON_DEMAND_STATUS_UNSPECIFIED = 0;
  ON_DEMAND_STATUS_ENABLED = 1;
  ON_DEMAND_STATUS_DISABLED = 2;
}

message AccountStatus {
  // The organization this status belongs to. Each org has one AccountStatus.
  uint64 organization_id = 1;
  // Legacy soft cap flag. When true, no category is rate-limited regardless of usage.
  bool soft_cap = 2;
  // Current account status (active, closed, past-due).
  Status status = 3;
  // Whether the account is suspended by an admin (e.g., for fraud).
  bool is_suspended = 4;
  // Free-form reason for admin suspension (e.g., "fraud", "tos_violation").
  string suspension_reason = 5;
  // PAYG on-demand spending status.
  OnDemandStatus ondemand_status = 6;
}
