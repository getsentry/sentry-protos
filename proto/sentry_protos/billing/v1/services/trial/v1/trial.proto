syntax = "proto3";

package sentry_protos.billing.v1.services.trial.v1;

import "sentry_protos/billing/v1/credit.proto";
import "sentry_protos/billing/v1/date.proto";
import "sentry_protos/billing/v1/feature.proto";

// The current status of a trial.
enum TrialStatus {
  TRIAL_STATUS_UNSPECIFIED = 0;
  TRIAL_STATUS_ACTIVE = 1;
  TRIAL_STATUS_INACTIVE = 2;
}

// Represents a time-bounded trial for an organization.
message Trial {
  Date credit_start_date = 1;
  Date credit_end_date = 2;
  Date feature_start_date = 3;
  Date feature_end_date = 4;
  TrialStatus status = 5;
  // This represents the SKU allowances granted by the trial, represented in the form of credits
  repeated sentry_protos.billing.v1.Credit credits = 6;
  // This represesnts the features allowed by the trial, represented in the form of feature options
  sentry_protos.billing.v1.FeatureOptions features = 7;
}
