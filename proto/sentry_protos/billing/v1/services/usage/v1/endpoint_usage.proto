syntax = "proto3";

package sentry_protos.billing.v1.services.usage.v1;

import "google/protobuf/timestamp.proto";
import "sentry_protos/billing/v1/data_category.proto";
import "sentry_protos/billing/v1/date.proto";
import "sentry_protos/billing/v1/seat_category.proto";

// Aggregated usage counts for a single data category.
message UsageData {
  uint64 total = 1;
  uint64 accepted = 2;
  uint64 dropped = 3;
  uint64 filtered = 4;
  uint64 over_quota = 5;
  uint64 spike_protection = 6;
  uint64 dynamic_sampling = 7;
}

message CategoryUsage {
  DataCategory category = 1;
  UsageData data = 2;
}

// Usage data for a single day.
message DailyUsage {
  Date date = 1;
  repeated CategoryUsage usage = 2;
}

message CategorySeatUsage {
  SeatCategory category = 1;
  uint64 count = 2;
}

message GetUsageResponse {
  // Usage broken down by day, each containing per-category usage.
  repeated DailyUsage days = 1;
  repeated CategorySeatUsage seats = 2;
}

message GetUsageRequest {
  uint64 organization_id = 1;
  google.protobuf.Timestamp start = 2;
  google.protobuf.Timestamp end = 3;
}
