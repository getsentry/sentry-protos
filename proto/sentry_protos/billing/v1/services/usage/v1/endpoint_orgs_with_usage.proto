syntax = "proto3";

package sentry_protos.billing.v1.services.usage.v1;

import "google/protobuf/timestamp.proto";
import "sentry_protos/billing/v1/data_category.proto";

message GetOrgsWithUsageRequest {
  google.protobuf.Timestamp start = 1;
  google.protobuf.Timestamp end = 2;

  // Optional filter for specific data categories.
  // When empty, usage for all categories is queried.
  repeated DataCategory categories = 3;
}

message GetOrgsWithUsageResponse {
  repeated uint64 organization_ids = 1;
}