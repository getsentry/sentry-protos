syntax = "proto3";

package sentry_protos.billing.v1.services.pending_change.v1;

import "sentry_protos/billing/v1/common/v1/sponsored_type.proto";

message SetPendingSponsoredTypeRequest {
  uint64 organization_id = 1;

  // The contract sponsored_type the subscription will switch to at the next
  // rollover. SPONSORED_TYPE_UNSPECIFIED removes the sponsorship.
  sentry_protos.billing.v1.common.v1.SponsoredType sponsored_type = 2;
}

message SetPendingSponsoredTypeResponse {}
