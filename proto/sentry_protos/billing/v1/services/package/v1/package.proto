syntax = "proto3";

package sentry_protos.billing.v1.services.package.v1;

import "sentry_protos/billing/v1/common/v1/billing_interval.proto";
import "sentry_protos/billing/v1/common/v1/flexible_price.proto";
import "sentry_protos/billing/v1/common/v1/line_item_details.proto";
import "sentry_protos/billing/v1/common/v1/pricing_tier.proto";

message LineItemConfig {
  // Base price for the line item (upgraded reserved volumes or add-on activation fees)
  uint64 base_price_cents = 1 [deprecated = true];
  sentry_protos.billing.v1.common.v1.TieredPricingRate payg_rate = 3;
  sentry_protos.billing.v1.common.v1.TieredPricingRate reserved_rate = 4; // for reserved budget line items

  // how many of this lineitem are included in the package, the customer can reserve more on their contract
  oneof included_reserved_units {
    bool is_unlimited = 5;
    uint64 num_reserved_units = 6; // the type communicates whether the line item is unlimited or not, additionally reserved budget line items have a non-zero reserved_rate in addition to 0 reserved_units
  }

  sentry_protos.billing.v1.common.v1.LineItemDetails line_item = 7;

  // Whether this LineItem is included in the base package or not (ie Seer)
  bool is_optional_add_on = 8;

  // Used for calculating spend that should not apply towards an organization's PAYG budget (ie Seer seats)
  sentry_protos.billing.v1.common.v1.TieredPricingRate uncapped_rate = 9;

  // How many units are available for a PackageConfig during a subscription trial? For packages that are not eligible for trials,
  // this field will be unset for all line items.
  oneof trial_units {
    bool is_unlimited_trial = 10;
    uint64 num_trial_units = 11;
  }
}

// Represents a budget included in a package that is collectively used by one or more line items,
// allowing multiple line items to draw from the same reserved budget.
message SharedLineItemPool {
  // how much money this shared pool has. For example, if logs costs $1.00 per GB and metrics
  // costs $1.00 per GB and we wanted to give metrics and logs a shared 5GB pool, the reserved_pool_cents
  // would be 500 ($5)
  uint64 reserved_pool_cents = 1 [deprecated = true]; // DEPRECATED: Use reserved_tier
  repeated sentry_protos.billing.v1.common.v1.LineItemDetails line_items = 3;

  // Whether this LineItem is included in the base package or not (ie Seer)
  bool is_optional_add_on = 4;

  // The unique line item details used when invoicing this shared pool.
  sentry_protos.billing.v1.common.v1.LineItemDetails shared_line_item = 5;

  // Cost of the shared line item pool, in cents(a customer can pay $X and get $Y of credit, where X!=Y).
  uint64 base_price_cents = 6 [deprecated = true]; // DEPRECATED: Use reserved_tier

  sentry_protos.billing.v1.common.v1.FlexiblePrice flexible_base_price_cents = 7 [deprecated = true]; // DEPRECATED: Use reserved_tier

  // Similar to LineItemConfig.reserved_rate, this field will hold the list of available reserved tiers for this line item
  // as well as the prices for each respective tier.
  sentry_protos.billing.v1.common.v1.TieredPricingRate reserved_tier = 8;

  // How many units are available for a PackageConfig during a subscription trial? For packages that are not eligible for trials,
  // this field will be unset for all line items.
  oneof trial_units {
    bool is_unlimited_trial = 9;
    uint64 num_trial_units = 10;
  }
}

message PackageConfig {
  string uid = 1;
  repeated LineItemConfig line_item_configs = 2;
  repeated SharedLineItemPool shared_line_item_pools = 3;
  // Base price for the package.
  uint64 base_price_cents = 4 [deprecated = true];
  sentry_protos.billing.v1.common.v1.FlexiblePrice flexible_base_price_cents = 8;
  // Deprecated. Use supported_month_intervals.
  sentry_protos.billing.v1.common.v1.BillingInterval billing_interval = 5 [deprecated = true];
  string title = 6;

  // Number-of-months billing intervals this package offers.
  // [1] = monthly only, [1, 12] = monthly or annual, [12] = annual only.
  repeated uint32 supported_month_intervals = 7;

  // Title shown in admin interfaces, not customer-facing.
  string admin_title = 9;

  // Whether the package is treated as enterprise in the UI (display name,
  // upsell suppression).
  bool is_enterprise = 10;

  // Whether the package can be chosen in the self-serve checkout flow.
  bool user_selectable = 11;

  // Whether the package has pay-as-you-go (PAYG) modes.
  bool has_payg_modes = 12;
}
