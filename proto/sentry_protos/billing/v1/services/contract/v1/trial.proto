syntax = "proto3";

package sentry_protos.billing.v1.services.contract.v1;

import "sentry_protos/billing/v1/services/contract/v1/billing_config.proto";
import "sentry_protos/billing/v1/services/contract/v1/sku.proto";

enum TrialType {
  TRIAL_TYPE_UNSPECIFIED = 0;
  //Trying only a specific product
  TRIAL_TYPE_PRODUCT = 1;
  //Trying a new plan with quota and features, not charged for, org must be on a free plan before
  TRIAL_TYPE_SUBSCRIPTION = 2;
  //Trying a new plan with quota and features, charged for general usage, org must be on a paid plan before
  TRIAL_TYPE_PLAN = 3;
  //Trying an enterprise plan with unlimited quotas and features, charged for previous plan, org must be on a paid plan before
  TRIAL_TYPE_ENTERPRISE = 4;
}

// The current status of a trial.
enum TrialStatus {
  TRIAL_STATUS_UNSPECIFIED = 0;
  TRIAL_STATUS_ACTIVE = 1;
  TRIAL_STATUS_COMPLETED = 2;
  TRIAL_STATUS_CANCELLED = 3;
}

// Represents a time-bounded trial for an organization.
message Trial {
  uint64 id = 1;
  uint64 organization_id = 2;
  TrialType type = 3;

  // What this trial grants access to -- either a plan ID or a specific SKU.
  oneof trial_target {
    string plan = 4;
    SKU sku = 5;
  }

  Date start_date = 6;
  Date end_date = 7;
  TrialStatus status = 8;
  //Used to infer the time the trial was activated/completed/cancelled
  Date status_changed_at = 9;
}
