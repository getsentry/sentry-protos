syntax = "proto3";

package sentry_protos.billing.v1.services.contract.v1;

// Guid-only lookup for webhook handlers that don't yet have an org.
message FindInvoiceByGuidRequest {
  string invoice_guid = 1;
}

message FindInvoiceByGuidResponse {
  optional uint64 invoice_id = 1;
  optional uint64 organization_id = 2;
}
