syntax = "proto3";

package sentry_protos.billing.v1.services.contract.v1;

// Clears manual_payment_started_at on an unpaid invoice.
message ReleaseManualPaymentLockRequest {
  uint64 invoice_id = 1;
}

message ReleaseManualPaymentLockResponse {
  // False when no row was updated.
  bool updated = 1;
}
