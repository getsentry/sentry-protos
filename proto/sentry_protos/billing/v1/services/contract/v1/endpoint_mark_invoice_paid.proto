syntax = "proto3";

package sentry_protos.billing.v1.services.contract.v1;

import "sentry_protos/billing/v1/services/contract/v1/invoice.proto";

// Marks an invoice as paid and clears its needs_charged flag so it is no longer
// returned by GetUnchargedInvoices.
message MarkInvoicePaidRequest {
  uint64 invoice_id = 1;
}

message MarkInvoicePaidResponse {
  // True if a matching invoice was found and updated.
  bool updated = 1;
  // The updated invoice after the mark-paid write. Unset when
  // ``updated`` is false. Callers that need the fresh proto (for
  // receipt rendering, downstream service calls) can consume this
  // directly rather than issuing a separate ``GetInvoice`` roundtrip.
  optional Invoice invoice = 2;
}
