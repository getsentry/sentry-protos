syntax = "proto3";

package sentry_protos.billing.v1.services.contract.v1;

import "google/protobuf/timestamp.proto";
import "sentry_protos/billing/v1/common/v1/address.proto";
import "sentry_protos/billing/v1/common/v1/pending_change.proto";
import "sentry_protos/billing/v1/services/contract/v1/invoice.proto";

// Creates a new contract for a new billing period. Closes out the current contract by
// creating an invoice and setting the last usage date
message RolloverContractRequest {
  uint64 contract_id = 1;
  google.protobuf.Timestamp last_usage_ts = 2;
  repeated InvoiceLineItem line_items = 3;
  sentry_protos.billing.v1.common.v1.Address address = 4;

  // The pending change to apply to the new contract, if any. Unset means no
  // pending change is being applied during this rollover.
  optional sentry_protos.billing.v1.common.v1.PendingChange pending_change = 5;

  // Whether the tax for this invoice could not be computed at creation time
  // (the tax provider was unavailable) and must be backfilled later. When set,
  // the invoice is created without a tax line item and held back from charging
  // until a sweep recomputes the tax.
  bool tax_pending = 6;
}

message RolloverContractResponse {
  uint64 invoice_id = 1;
  bool needs_charge = 2;
  uint64 amount_billed = 3;
}
