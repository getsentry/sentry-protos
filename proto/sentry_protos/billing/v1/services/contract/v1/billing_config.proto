syntax = "proto3";

package sentry_protos.billing.v1.services.contract.v1;

message Date {
  uint32 year = 1;
  uint32 month = 2;
  uint32 day = 3;
}

// Indicates how the account is billed.
enum BillingType {
  BILLING_TYPE_UNSPECIFIED = 0;
  BILLING_TYPE_INVOICED = 1;
  BILLING_TYPE_CREDIT_CARD = 2;
  BILLING_TYPE_PARTNER = 3;
}

// The channel through which the contract is billed.
enum BillingChannel {
  option deprecated = true;

  BILLING_CHANNEL_UNSPECIFIED = 0;
  BILLING_CHANNEL_SELF_SERVE = 1;
  BILLING_CHANNEL_SALES = 2;
  BILLING_CHANNEL_PARTNER = 3;
}

// The type of sponsorship associated with a contract.
enum SponsoredType {
  SPONSORED_TYPE_UNSPECIFIED = 0;
  SPONSORED_TYPE_EDUCATION = 1;
  SPONSORED_TYPE_OPEN_SOURCE = 2;
  SPONSORED_TYPE_NON_PROFIT = 3;
  SPONSORED_TYPE_FRIENDS_AND_FAMILY = 4;
  SPONSORED_TYPE_FLY_IO = 5;
  SPONSORED_TYPE_NINTENDO = 6;
  SPONSORED_TYPE_EMPLOYEE = 7;
}

// Configuration for a sponsored contract. The presence of this message on a
// BillingConfig indicates the contract is sponsored; its absence means it is
// not.
message SponsorshipConfig {
  SponsoredType sponsored_type = 1;

  // Whether this sponsored Contract is eligible to start trials.
  bool can_trial = 2;

  // Whether this sponsored Contract can checkout.
  bool can_checkout = 3;
}

// The external billing provider used to process payments for the contract.
enum ExternalBillingProvider {
  option deprecated = true;

  EXTERNAL_BILLING_PROVIDER_UNSPECIFIED = 0;
  EXTERNAL_BILLING_PROVIDER_STRIPE = 1;
  EXTERNAL_BILLING_PROVIDER_VERCEL = 2;
}

message Address {
  option deprecated = true;

  string city = 1;
  string region = 2;
  string country_code = 3;
  string postal_code = 4;
  string address_line_1 = 5;
  string address_line_2 = 6;
  string address_line_3 = 7;
}

message BillingConfig {
  BillingType billing_type = 1;

  // Remaining fields are deprecated
  BillingChannel channel = 2 [deprecated = true];
  ExternalBillingProvider external_billing_provider = 3 [deprecated = true];
  Address address = 4 [deprecated = true];
  // Use PricingConfig.billing_period_start_date and PricingConfig.billing_period_end_date
  Date contract_start_date = 5 [deprecated = true];
  Date contract_end_date = 6 [deprecated = true];

  // The number-of-months interval the contract was signed under
  // (1 = monthly, 12 = annual). Frozen for the life of the contract.
  uint32 month_interval = 7;

  // Whether the org is allowed to incur pay-as-you-go usage.
  // Credit-card orgs always support payg; invoiced orgs that should
  // support it are an explicit override.
  bool supports_payg = 8;

  // Whether this is a managed (sales-assisted) subscription rather than
  // self-serve.
  bool is_managed = 9;

  // Whether the org has a soft cap: usage past reserved volume is allowed
  // (and billed) instead of hard-stopping ingestion.
  bool has_soft_cap = 10;

  // Sponsorship configuration. Absent means the contract is not sponsored.
  optional SponsorshipConfig sponsorship_config = 11;
}
