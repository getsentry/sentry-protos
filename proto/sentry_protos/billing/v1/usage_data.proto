syntax = "proto3";

package sentry_protos.billing.v1;

// Aggregated usage counts for a single data category.
message UsageData {
  uint64 total = 1;
  uint64 accepted = 2;
  uint64 dropped = 3;
  uint64 filtered = 4;
  uint64 over_quota = 5;
  uint64 spike_protection = 6;
  uint64 dynamic_sampling = 7;
}
