syntax = "proto3";

package sentry_protos.snuba.v1;

import "sentry_protos/snuba/v1/attribute_conditional_aggregation.proto";
import "sentry_protos/snuba/v1/formula.proto";
import "sentry_protos/snuba/v1/request_common.proto";
import "sentry_protos/snuba/v1/trace_item_attribute.proto";
import "sentry_protos/snuba/v1/trace_item_filter.proto";

// This is a request to the TraceItemTable endpoint,
// it is used to query for TraceItems (ex. spans)
// it returns tabular data where each row is a TraceItem,
// and the columns are the attributes of the TraceItem
// it can also be used for aggregations
message TraceItemTableRequest {
  message OrderBy {
    // Sort selects which sort order is applied when ordering by a textual
    // column. It has no effect when ordering by a numeric column.
    enum Sort {
      // Defaults to SORT_DEFAULT (lexicographic). This keeps the behaviour
      // backwards compatible when `sort` is left unset.
      SORT_UNSPECIFIED = 0;
      // Default lexicographic ordering: values are compared by their Unicode
      // code points, so e.g. "item10" sorts before "item2".
      SORT_DEFAULT = 1;
      // Natural ordering: embedded runs of digits are compared by their
      // numeric value, so e.g. "item2" sorts before "item10".
      SORT_NATURAL = 2;
    }

    Column column = 1;
    bool descending = 2;

    // The sort order to apply when ordering by a textual column. Defaults to
    // SORT_DEFAULT (lexicographic) when unset, preserving the historical
    // behaviour. Set to SORT_NATURAL to order alphanumeric values naturally
    // (e.g. "item2" before "item10"). Ignored for numeric columns.
    Sort sort = 3;
  }

  // Limits results per group rather than globally: for each distinct
  // combination of `columns`, keep at most `limit` rows (the first `limit` per
  // `order_by`). E.g. grouping by project and ordering by count, `limit` = 100
  // returns the top 100 rows for every project.
  message LimitBy {
    // The columns that define a group. Each may be a column, an alias of a
    // selected column (a Column with only `label` set), or a non-aggregate
    // transformation (e.g. a formula). Aggregations are not allowed.
    repeated Column columns = 1;
    // Maximum number of rows to keep per group.
    uint32 limit = 2;
  }

  RequestMeta meta = 1;

  // the columns or aggregations you want to get
  repeated Column columns = 2;

  // filter out trace items you dont want
  TraceItemFilter filter = 3;

  repeated OrderBy order_by = 4;

  repeated AttributeKey group_by = 5;

  // Global cap on the total number of returned rows. Cannot be set together
  // with `limit_by`; specify one or the other, not both.
  uint32 limit = 6;

  // optional, used for pagination, the next page token will be returned in the response
  PageToken page_token = 7;

  repeated VirtualColumnContext virtual_column_contexts = 8;

  // optional, filter out results of aggregates, same as SQL HAVING
  AggregationFilter aggregation_filter = 9;

  // A list of filters applied to each item type provided. These filters will be applied on a trace level to find traces
  // that contain each of the provided items with matching conditions. The overall request will then only apply on those traces.
  // If specified, the endpoint will only consider traces that match all the filters.
  // ex: Find spans in traces containing a span with op = 'db' that also contain errors with message = 'timeout'
  repeated TraceItemFilterWithType trace_filters = 10;

  // optional, limits the number of returned rows per group. Cannot be set
  // together with `limit`; specify one or the other, not both. See LimitBy.
  LimitBy limit_by = 11;
}

message AggregationAndFilter {
  repeated AggregationFilter filters = 1;
}

message AggregationOrFilter {
  repeated AggregationFilter filters = 1;
}

message AggregationComparisonFilter {
  enum Op {
    OP_UNSPECIFIED = 0;
    OP_LESS_THAN = 1;
    OP_GREATER_THAN = 2;
    OP_LESS_THAN_OR_EQUALS = 3;
    OP_GREATER_THAN_OR_EQUALS = 4;
    OP_EQUALS = 5;
    OP_NOT_EQUALS = 6;
  }
  Column column = 1 [deprecated = true]; // deprecated as columns should always be aggregated in a post aggregation filter
  Op op = 2;
  AttributeValue value = 3 [deprecated = true]; // since only aggregated columns are supported, the value should be numeric
  double val = 5;
  AttributeAggregation aggregation = 4;
  AttributeConditionalAggregation conditional_aggregation = 6;
  Column.BinaryFormula formula = 7;
}

message AggregationFilter {
  oneof value {
    AggregationAndFilter and_filter = 1;
    AggregationOrFilter or_filter = 2;
    AggregationComparisonFilter comparison_filter = 3;
  }
}

message Column {
  oneof column {
    AttributeKey key = 1;
    AttributeAggregation aggregation = 2;
    AttributeConditionalAggregation conditional_aggregation = 5;
    BinaryFormula formula = 4;
    Literal literal = 6;
    ConditionalFormula conditional_formula = 7;
  }
  string label = 3;

  message BinaryFormula {
    enum Op {
      OP_UNSPECIFIED = 0;
      OP_DIVIDE = 1;
      OP_MULTIPLY = 2;
      OP_ADD = 3;
      OP_SUBTRACT = 4;
    }
    Op op = 1;
    Column left = 2;
    Column right = 3;
    // optional, if the formula evalutates to null this value is returned
    // formula can evaluate to null if an attribute is missing for example
    oneof default_value {
      double default_value_double = 4;
      int64 default_value_int64 = 5;
    }
  }

  message FormulaCondition {
    enum Op {
      OP_UNSPECIFIED = 0;
      OP_LESS_THAN = 1;
      OP_GREATER_THAN = 2;
      OP_LESS_THAN_OR_EQUALS = 3;
      OP_GREATER_THAN_OR_EQUALS = 4;
      OP_EQUALS = 5;
      OP_NOT_EQUALS = 6;
    }
    Column left = 1;
    Op op = 2;
    Column right = 3;
  }

  message ConditionalFormula {
    FormulaCondition condition = 1;
    Column match = 2;
    Column default = 3;
  }
}

message TraceItemColumnValues {
  string attribute_name = 1;

  repeated AttributeValue results = 2;

  // reliability of the values based on confidence interval and sample size math
  repeated Reliability reliabilities = 3;
}

// this is a response from the TraceItemTable endpoint
// it is the counterpart to TraceItemTableRequest
message TraceItemTableResponse {
  // the rows
  repeated TraceItemColumnValues column_values = 1;

  // page token for the next page of results
  PageToken page_token = 2;

  ResponseMeta meta = 3;
}
