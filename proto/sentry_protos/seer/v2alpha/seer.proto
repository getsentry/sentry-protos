syntax = "proto3";

package sentry_protos.seer.v2alpha;

// The provider that serves a model. Mirrors Seer's LlmProviderType.
enum Provider {
  PROVIDER_UNSPECIFIED = 0;
  PROVIDER_OPENAI = 1;
  PROVIDER_ANTHROPIC = 2;
  PROVIDER_GEMINI = 3;
}

// A model that Seer can use to serve requests.
message Model {
  // The provider-facing model name. This is the identifier used to request
  // the model, e.g. "claude-opus-4-8@default" or "gemini-2.5-pro".
  string name = 1;

  // The provider that serves the model.
  Provider provider = 2;
}

message GetModelsRequest {}

message GetModelsResponse {
  // The models currently available to Seer.
  repeated Model models = 1;
}

// SeerService exposes Seer's capabilities over RPC.
service SeerService {
  // GetModels returns the models currently available to Seer.
  rpc GetModels(GetModelsRequest) returns (GetModelsResponse) {}
}
